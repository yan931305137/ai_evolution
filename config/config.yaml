# OpenClaw-Local Configuration

# ============================================
# LLM Configuration - 大语言模型配置
# ============================================
llm:
  # 提供商选择: coze | ark | brain | hybrid
  # coze: Coze平台（默认）
  # ark: 火山引擎Ark
  # brain: 人类级大脑（本地AI架构）
  # hybrid: Brain + LLM混合模式（Brain思考，LLM表达）
  provider: hybrid
  
  # ============================================
  # Coze/Ark 通用配置
  # ============================================
  
  # ark
  # api_key: "21ba1178-abe6-4b34-9e83-f46b2af0e057"
  # base_url: "https://ark.cn-beijing.volces.com/api/v3"
  
  # coze
  # api_key: "UVhibGNLSDA1ZVk3SUJVV0xKaGxmOEVmdkhTOUZNbXA6QVp2OG1CdU1IVFFmRDdOc2xZSkpFd2lrdmVvTFdyWjdmb0Mzc25XZFBMOUgwaXJFR1p3NFRKS1gzUnV2enU2NA=="
  # base_url: "https://integration.coze.cn/api/v3"

  model_name: doubao-seed-2-0-pro-260215
  temperature: 0.7
  timeout: 600
  max_tokens: 4096
  
  # ============================================
  # Brain（人类级大脑）专用配置
  # ============================================
  brain:
    # 发育起点
    start_as_infant: false  # true=从婴儿开始, false=直接使用成年大脑
    
    # 身份配置（可选）
    identity:
      name: "OpenClaw Brain"
      values: ["求知", "助人", "成长"]
      goals: ["理解世界", "帮助用户", "持续进化"]
    
    # 认知能力开关
    capabilities:
      embodied: true      # 具身认知
      emotion: true       # 情感系统
      developmental: true # 发育学习
      social: true        # 社会认知
      homeostasis: true   # 内稳态驱动
      metacognition: true # 元认知
    
    # 情感响应模式
    emotional_mode: balanced  # balanced|empathetic|analytical
    
    # 发育速度（如果start_as_infant=true）
    growth_rate: normal  # slow|normal|fast

  # ============================================
  # Hybrid（Brain + LLM混合模式）专用配置
  # ============================================
  hybrid:
    # 是否从婴儿阶段开始
    start_as_infant: false
    
    # LLM提供商选择（用于语言表达）
    # 可选: coze, ark, deepseek, openai
    # 如果不指定，自动检测环境变量
    llm_provider: null
    
    # 提示词模板配置
    prompt_template:
      # 是否显示Brain的内部状态给LLM
      expose_brain_state: true
      
      # 情感注入强度
      emotional_influence: medium  # none|low|medium|high
      
      # 记忆上下文长度
      memory_context_length: 3

# Database Configuration
database:
  path: "assets/database.db"
  type: "sqlite"

# Memory System Configuration
memory:
  chroma_path: "assets/chroma_db"
  collection_names:
    conversations: "conversations"
    knowledge: "knowledge"

# Agent Configuration
agent:
  max_steps: 10000
  max_repeat_actions: 3
  llm_retries:
    max_retries: 3
    retry_delay_base: 1
  memory_retrieval:
    complex_task_results: 8
    simple_task_results: 3
  complex_task_keywords:
    - "代码"
    - "编写"
    - "开发"
    - "debug"
    - "故障排查"
    - "错误修复"
    - "优化"
    - "实现"
    - "部署"
    - "测试"
  
  # Context Compression Configuration
  context:
    max_messages: 20           # 最大保留消息数
    max_tokens: 8000           # 最大 Token 数（约等于上下文窗口的80%）
    compress_threshold: 15     # 触发压缩的消息数阈值
    summary_length: 200        # 摘要长度（字符）
  
  # Multi-Agent Configuration
  multi_agent:
    enabled: true              # 是否启用多 Agent 模式
    auto_detect: true          # 自动检测任务复杂度并决定是否使用多 Agent
    complexity_threshold: 4    # 复杂度阈值，超过则使用多 Agent
    max_parallel_tasks: 3      # 最大并行任务数
    
    # Specialist Agent 配置
    specialists:
      code:
        max_steps: 50
        max_messages: 15
        max_tokens: 6000
        compress_threshold: 10
      test:
        max_steps: 40
        max_messages: 15
        max_tokens: 6000
        compress_threshold: 10
      doc:
        max_steps: 30
        max_messages: 12
        max_tokens: 5000
        compress_threshold: 8
      review:
        max_steps: 30
        max_messages: 12
        max_tokens: 5000
        compress_threshold: 8
      analyze:
        max_steps: 40
        max_messages: 15
        max_tokens: 6000
        compress_threshold: 10
      refactor:
        max_steps: 50
        max_messages: 15
        max_tokens: 6000
        compress_threshold: 10
      debug:
        max_steps: 50
        max_messages: 15
        max_tokens: 6000
        compress_threshold: 10

# Self-Evolution Configuration
self_evolution:
  enabled: true
  iteration_interval_minutes: 30
  max_consecutive_failures: 3
  auto_restart: true

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"

# ============================================
# 信息获取渠道分类梳理与筛选项目 - 业务配置
# ============================================

# 分类标签配置
classification:
  # 信息源分类标签定义
  categories:
    - name: "官方权威"
      description: "政府机构、官方组织发布的权威信息源"
      priority: 1
    - name: "专业媒体"
      description: "专业媒体、期刊、研究报告等"
      priority: 2
    - name: "行业资讯"
      description: "行业动态、市场资讯类信息源"
      priority: 3
    - name: "社交媒体"
      description: "社交媒体平台、论坛等用户生成内容"
      priority: 4
    - name: "个人博客"
      description: "个人博客、自媒体等"
      priority: 5
  
  # 自动分类规则
  auto_classification_rules:
    - keyword_pattern: ["gov", "gov.cn", "官方", "政府部门"]
      target_category: "官方权威"
    - keyword_pattern: ["journal", "期刊", "学报", "研究"]
      target_category: "专业媒体"
    - keyword_pattern: ["news", "资讯", "行业", "市场"]
      target_category: "行业资讯"
    - keyword_pattern: ["weibo", "twitter", "facebook", "forum", "论坛"]
      target_category: "社交媒体"
    - keyword_pattern: ["blog", "博客", "自媒体", "个人"]
      target_category: "个人博客"

# 筛选标准配置
screening_criteria:
  # 更新频率筛选
  update_frequency:
    min_days: 1  # 最小更新间隔（天）
    max_days: 30  # 最大更新间隔（天）
    check_period_days: 7  # 检查周期（天）
  
  # 内容质量评分标准
  quality_scoring:
    # 权威性评分（0-100）
    authority:
      official_source_weight: 30  # 官方来源权重
      professional_media_weight: 25  # 专业媒体权重
      industry_institution_weight: 20  # 行业机构权重
      individual_weight: 10  # 个人来源权重
      unknown_weight: 5  # 未知来源权重
    
    # 稳定性评分（0-100）
    stability:
      update_frequency_weight: 40  # 更新频率权重
      uptime_rate_weight: 30  # 可用性权重
      historical_reliability_weight: 30  # 历史可靠性权重
    
    # 内容质量评分（0-100）
    content_quality:
      professional_depth_weight: 35  # 专业深度权重
      information_density_weight: 30  # 信息密度权重
      accuracy_verification_weight: 20  # 准确性验证权重
      readability_weight: 15  # 可读性权重
    
    # 综合评分阈值
    overall_threshold:
      high_quality: 80  # 高质量阈值
      medium_quality: 60  # 中等质量阈值
