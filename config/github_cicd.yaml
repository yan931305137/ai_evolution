# ============================================
# GitHub CI/CD 集成配置
# ============================================
# 本文件配置 GitHub Actions CI/CD 自动化集成
# 也可以在 .env 文件中设置对应的环境变量
# ============================================

# GitHub 认证配置
github:
  # GitHub Personal Access Token
  # 获取方式: https://github.com/settings/tokens
  # 需要的权限: repo, workflow, pull_requests:write
  token: null
  
  # 仓库所有者（用户名或组织名）
  owner: null
  
  # 仓库名称
  repo: null
  
  # 注意: 以上配置也可以通过环境变量设置:
  # GITHUB_TOKEN, GITHUB_OWNER, GITHUB_REPO

# ============================================
# 进化系统 CI/CD 配置
# ============================================
# 控制进化完成后是否自动触发 CI/CD
# ============================================

self_evolution:
  # 基础进化配置
  enabled: true
  iteration_interval_minutes: 30
  max_consecutive_failures: 3
  auto_restart: true
  
  # CI/CD 集成配置
  cicd:
    # 是否启用 CI/CD 自动化
    enabled: false
    
    # 应用阶段后是否自动触发 CI/CD
    # 如果为 true，进化应用想法后会自动运行测试
    auto_trigger: true
    
    # 进化分支名称
    # CI/CD 将在这个分支上运行
    branch: "evolution"
    
    # CI/CD 成功后是否自动创建 Pull Request
    create_pr: true
    
    # 是否自动合并 PR（谨慎开启！）
    # 建议仅在完全信任进化系统时启用
    # 生产环境建议保持 false，人工审查后再合并
    auto_merge: false
    
    # CI 工作流文件名
    # 对应 .github/workflows/ 目录下的文件
    workflow: "ci.yml"
    
    # 等待 CI/CD 完成的超时时间（秒）
    timeout: 600
    
    # 轮询间隔（秒）
    poll_interval: 10

# ============================================
# PR 模板配置
# ============================================
pr_template:
  # PR 标题前缀
  title_prefix: "🤖 Evolution: "
  
  # PR 内容模板
  body: |
    ## 🤖 Automated Evolution Changes
    
    This PR contains changes generated by the AI evolution system.
    
    ### Changes Summary
    - Code improvements based on evaluation
    - Automated refactoring and optimizations
    - Test coverage enhancements
    
    ### Verification
    - [x] All tests passing
    - [x] Code quality checks passed
    - [x] No breaking changes introduced
    
    ---
    *This PR was automatically created by the Evolution Feedback Loop*

# ============================================
# CI/CD 状态回调配置
# ============================================
callbacks:
  # 是否在状态变化时打印日志
  log_status_changes: true
  
  # 是否在完成时打印详细结果
  log_completion_details: true
