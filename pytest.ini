
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test classification
markers =
    unit: marks tests as unit tests (fast, no external dependencies)
    integration: marks tests as integration tests (slower, may use external resources)
    brain: marks tests related to brain/cognitive functions
    tool: marks tests related to tool execution

# Console output configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_date_format = %Y-%m-%d %H:%M:%S

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
