# 简化版 CI/CD 配置
# 移除了需要外部服务的步骤（镜像推送和部署），仅保留核心质量检查

name: 简化版 CI 流水线

on:
  push:
    branches: [ main, dev, feature/* ]
  pull_request:
    branches: [ main, dev ]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ========== Job 1: 代码质量检查 ==========
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 缓存 pip 依赖
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: runner.os−pip−{{ runner.os }}-pip-{{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 🔍 代码格式检查 (可选)
        run: |
          pip install black flake8
          # 检查代码格式但不强制失败
          black --check src/ tests/ || echo "⚠️ 代码格式需要优化"
          flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503 || echo "⚠️ 有代码风格警告"
        continue-on-error: true

  # ========== Job 2: 单元测试 ==========
  unit-test:
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 缓存 pip 依赖
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: runner.os−pip−{{ runner.os }}-pip-{{ hashFiles('requirements.txt') }}

      - name: 📥 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: ✅ 运行单元测试
        run: |
          pytest tests/ -v --tb=short
        env:
          TZ: Asia/Shanghai

      - name: 📊 生成覆盖率报告
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=html --cov-fail-under=25
        continue-on-error: true  # 覆盖率不达标不阻塞流程

      - name: 📤 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
        if: always()

  # ========== Job 3: 敏感信息扫描 ==========
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史记录

      - name: 🐍 设置 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📥 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔒 运行敏感信息扫描
        run: |
          echo "🔍 扫描敏感信息..."
          python -m src.utils.security_scanner . \
            --format text \
            --max-critical 20 \
            --max-high 200 || true  # 非阻塞，仅报告

      - name: 🔍 TruffleHog 深度扫描
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified

  # ========== Job 4: 依赖安全检查 ==========
  security-audit:
    runs-on: ubuntu-latest
    needs: [quality-check, unit-test]
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📥 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔐 Safety 依赖漏洞扫描
        run: |
          pip install safety
          # 允许中等及以下级别漏洞，只报告高危和严重漏洞
          safety check --full-report --ignore=51457 --ignore=51458 || true
        continue-on-error: true

      - name: 🔐 pip-audit 依赖扫描
        run: |
          pip install pip-audit
          pip-audit --desc || true
        continue-on-error: true

  # ========== Job 5: Docker 构建测试 ==========
  docker-build-test:
    runs-on: ubuntu-latest
    needs: [unit-test, security-audit]
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐳 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 构建 Docker 镜像（仅测试，不推送）
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # 不推送到仓库，仅测试构建
          tags: openclaw:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ 验证镜像
        run: |
          docker images | grep openclaw
          echo "✅ Docker 镜像构建成功"

  # ========== Job 6: 汇总报告 ==========
  summary:
    runs-on: ubuntu-latest
    needs: [unit-test, secrets-scan, security-audit, docker-build-test]
    if: always()
    steps:
      - name: 📊 生成 CI 汇总报告
        run: |
          echo "======================================"
          echo "📊 CI 流水线执行完成"
          echo "======================================"
          echo ""
          echo "✅ 单元测试: ${{ needs.unit-test.result }}"
          echo "✅ 敏感信息扫描: ${{ needs.secrets-scan.result }}"
          echo "✅ 依赖安全检查: ${{ needs.security-audit.result }}"
          echo "✅ Docker 构建测试: ${{ needs.docker-build-test.result }}"
          echo ""
          echo "提示: 这是简化版 CI，不包含镜像推送和自动部署"
          echo "如需完整 CI/CD，请参考 docs/GITHUB_SECRETS_GUIDE.md 配置 Secrets"
